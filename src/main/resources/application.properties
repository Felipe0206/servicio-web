# ============================================================
# Configuración de la aplicación
# GA7-220501096-AA5-EV01 - Servicio Web de Autenticación
# ============================================================

# Puerto en el que corre el servidor
server.port=8081

# Nombre de la aplicación
spring.application.name=servicio-auth

# ---- Configuración de base de datos H2 (en memoria) ----
# URL de conexión a la base de datos en memoria
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitar consola web H2 para visualizar la BD (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Configuración JPA/Hibernate ----
# Crear/actualizar tablas automáticamente al iniciar
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
